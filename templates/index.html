<!DOCTYPE html>
<html>
<head>
    <title>AI Voice Bot</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>

<body>

    <div class="container">

        <h1>🎙 AI Voice Bot</h1>

        <input
            type="text"
            id="message"
            placeholder="Type your message"
        >

        <button onclick="sendMessage()">
            Send
        </button>

        <button onclick="startVoice()">
            🎤 Speak
        </button>

        <div id="response"></div>

    </div>

    <script src="/static/js/script.js"></script>
<button onclick="loadAnalytics()">Analytics</button>
<button onclick="loadCalls()">Calls</button>
<button onclick="loadCallResults()">Call Results</button>

<div id="output"></div>
</body>
</html>
